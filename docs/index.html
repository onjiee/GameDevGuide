<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Website — Home</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a;
    --border: #2e3347; --text: #e8eaf2; --muted: #7880a0;
    --green: #4ade80; --green-dim: #1a3a2a; --green-border: #2d5a3d;
    --blue: #60a5fa; --blue-dim: #1a2a3a; --blue-border: #2d4a6a;
    --accent: #818cf8; --radius: 12px;
    --mono: 'Fira Code', monospace; --sans: system-ui, 'Segoe UI', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--sans);
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; padding: 3rem 1rem 4rem; }
  header { text-align: center; margin-bottom: 2.5rem; }
  header h1 { font-size: 28px; font-weight: 700; margin-bottom: .5rem; }
  header p  { font-size: 15px; color: var(--muted); }
  nav a.slides-btn {
    display: inline-block; margin-top: 1rem;
    padding: 8px 20px; border-radius: 8px;
    background: var(--accent); color: #fff;
    text-decoration: none; font-size: 14px; font-weight: 500;
    transition: opacity .15s;
  }
  nav a.slides-btn:hover { opacity: .85; }
  .labs { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 12px; }
  .lab-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1.1rem 1.4rem;
    display: flex; align-items: center; justify-content: space-between;
    text-decoration: none; color: var(--text);
    transition: border-color .2s, background .2s;
  }
  .lab-card:hover { border-color: var(--accent); background: var(--surface2); }
  .lab-card .left h2 { font-size: 16px; font-weight: 600; margin-bottom: .25rem; }
  .lab-card .left p  { font-size: 13px; color: var(--muted); }
  .lab-card .arrow   { font-size: 18px; color: var(--muted); }
  .section-label {
    width: 100%; max-width: 600px;
    font-size: 11px; font-weight: 600; letter-spacing: .08em;
    text-transform: uppercase; color: var(--muted);
    margin: 1.5rem 0 .75rem;
  }
</style>
</head>
<body>

<header>
  <h1>🌐 My Website</h1>
  <p>รวม Lab ทั้งหมดของโปรเจกต์</p>
  <nav><a class="slides-btn" href="slides.html">📖 ดูสไลด์สอน GitHub Pages</a></nav>
</header>

<div class="section-label">Labs</div>

<div class="labs">

  <a class="lab-card" href="Lab01/">
    <div class="left">
      <h2>Lab 01</h2>
      <p>คำอธิบาย Lab 01 สั้นๆ</p>
    </div>
    <span class="arrow">→</span>
  </a>

  <a class="lab-card" href="Lab02/">
    <div class="left">
      <h2>Lab 02</h2>
      <p>คำอธิบาย Lab 02 สั้นๆ</p>
    </div>
    <span class="arrow">→</span>
  </a>

  <a class="lab-card" href="Lab03/">
    <div class="left">
      <h2>Lab 03</h2>
      <p>คำอธิบาย Lab 03 สั้นๆ</p>
    </div>
    <span class="arrow">→</span>
  </a>

  <!-- เพิ่ม Lab ใหม่ได้ที่นี่ — copy block ด้านบน แล้วเปลี่ยนเลข -->

</div>

</body>
</html>
